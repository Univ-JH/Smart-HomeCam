{% extends "base.html" %}

{% block content %}
<div class="row g-3">
    <div class="col-12">
        <div class="card shadow overflow-hidden">
            <div class="position-relative">
                <img src="/video_feed" class="w-100" style="min-height: 240px; background: #000; object-fit: cover;">
                
                <div class="position-absolute top-0 end-0 m-2">
                    <span class="badge rounded-pill {{ 'text-bg-success' if is_home else 'text-bg-danger' }} shadow">
                        {{ 'HOME' if is_home else 'SECURITY' }}
                    </span>
                </div>
            </div>
            
            <div class="card-footer bg-dark border-top border-secondary py-2">
                <div class="d-flex justify-content-between align-items-center">
                    <small class="text-muted"><i class="bi bi-bluetooth"></i> {{ '연결됨' if is_home else '신호 없음' }}</small>
                    <small class="text-white">{{ manual_val if is_home else 'AUTO' }}%</small>
                </div>
            </div>
        </div>
    </div>

    <div class="col-12">
        {% if is_home %}
        <div class="accordion shadow" id="controlAccordion">
            <div class="accordion-item bg-dark border-secondary">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-secondary text-white collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseSettings">
                        <i class="bi bi-sliders me-2"></i> 제어 설정 열기
                    </button>
                </h2>
                <div id="collapseSettings" class="accordion-collapse collapse show" data-bs-parent="#controlAccordion">
                    <div class="accordion-body text-white">
                        <form id="settingsForm">
                            <label class="form-label text-muted small fw-bold">제어 모드</label>
                            <div class="btn-group w-100 mb-3" role="group">
                                <input type="radio" class="btn-check" name="control_mode" id="m1" value="1" onchange="updateSettings()" {{ 'checked' if mode==1 }}>
                                <label class="btn btn-outline-primary" for="m1">자세</label>

                                <input type="radio" class="btn-check" name="control_mode" id="m2" value="2" onchange="updateSettings()" {{ 'checked' if mode==2 }}>
                                <label class="btn btn-outline-primary" for="m2">제스처</label>

                                <input type="radio" class="btn-check" name="control_mode" id="m3" value="3" onchange="updateSettings()" {{ 'checked' if mode==3 }}>
                                <label class="btn btn-outline-primary" for="m3">수동</label>
                            </div>

                            <hr class="border-secondary">

                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label class="form-label mb-0">전원</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="manual_on" style="transform: scale(1.3);" onchange="updateSettings()" {{ 'checked' if manual_on }}>
                                </div>
                            </div>
                            
                            <label class="form-label text-muted small">밝기 조절</label>
                            <input type="range" class="form-range" name="manual_val" min="0" max="255" value="{{ manual_val }}" oninput="updateSettings()">
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="alert alert-danger d-flex align-items-center shadow" role="alert">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0 me-2 fs-1"></i>
            <div>
                <strong>보안 모드 작동 중!</strong><br>
                침입자가 감지되면 자동으로 녹화됩니다.
            </div>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
