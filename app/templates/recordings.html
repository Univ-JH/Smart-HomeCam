{% extends "base.html" %}

{% block content %}
<h5 class="mb-3 text-white"><i class="bi bi-collection-play"></i> 녹화 기록</h5>

{% if files %}
<div class="list-group shadow">
    {% for file in files %}
    <div class="list-group-item list-group-item-action bg-dark text-white border-secondary d-flex justify-content-between align-items-center p-3">
        <div class="d-flex align-items-center">
            <div class="bg-danger bg-opacity-25 text-danger rounded p-2 me-3">
                <i class="bi bi-file-earmark-play-fill fs-4"></i>
            </div>
            <div>
                <h6 class="mb-0 fw-bold">{{ file.date }}</h6>
                <small class="text-muted">{{ file.size }} MB</small>
            </div>
        </div>
        <a href="/download/{{ file.name }}" class="btn btn-outline-light btn-sm rounded-pill">
            <i class="bi bi-download"></i>
        </a>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-5 text-muted">
    <i class="bi bi-camera-video-off display-1"></i>
    <p class="mt-3">저장된 파일이 없습니다.</p>
</div>
{% endif %}
{% endblock %}
